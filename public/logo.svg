<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients matching the Eden imagery -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fef9f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d9c1;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="treeLightGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#8bc34a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#558b2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#33691e;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81d4fa;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.9" />
    </linearGradient>
    
    <radialGradient id="trunkGradient">
      <stop offset="0%" style="stop-color:#8d6e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#skyGradient)"/>

  <!-- Distant mountains/hills silhouette -->
  <path d="M 0 200 Q 100 150 200 170 Q 300 190 400 160 L 400 400 L 0 400 Z" fill="#a5a5a5" opacity="0.15"/>
  
  <!-- Water curves/streams in S-shape like in the images -->
  <path d="M 120 240 Q 150 220 180 235 Q 200 250 210 280 Q 220 300 240 310" 
        stroke="url(#waterGradient)" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.85"/>
  
  <!-- Water highlights -->
  <ellipse cx="140" cy="230" rx="8" ry="14" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="190" cy="260" rx="7" ry="12" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="230" cy="300" rx="6" ry="10" fill="#ffffff" opacity="0.35"/>

  <!-- Main central tree trunk - thicker, more organic -->
  <path d="M 200 280 Q 195 200 200 140 Q 202 100 200 80" 
        stroke="url(#trunkGradient)" stroke-width="45" fill="none" stroke-linecap="round"/>
  
  <!-- Tree roots spreading down -->
  <path d="M 175 290 Q 150 320 140 360" stroke="#6d4c41" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 225 290 Q 250 320 260 360" stroke="#6d4c41" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 200 295 Q 200 330 200 370" stroke="#6d4c41" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Main foliage crown - massive and lush like in images -->
  <ellipse cx="200" cy="100" rx="95" ry="85" fill="url(#treeLightGradient)"/>
  
  <!-- Left foliage bulges -->
  <circle cx="120" cy="120" r="60" fill="#689f38"/>
  <circle cx="100" cy="150" r="50" fill="#7cb342"/>
  <circle cx="140" cy="160" r="45" fill="#8bc34a"/>
  
  <!-- Right foliage bulges -->
  <circle cx="280" cy="120" r="60" fill="#689f38"/>
  <circle cx="300" cy="150" r="50" fill="#7cb342"/>
  <circle cx="260" cy="160" r="45" fill="#8bc34a"/>
  
  <!-- Center top foliage -->
  <circle cx="200" cy="40" r="55" fill="#7cb342"/>
  <circle cx="170" cy="70" r="50" fill="#8bc34a"/>
  <circle cx="230" cy="70" r="50" fill="#8bc34a"/>

  <!-- Light glints on tree foliage (golden hour lighting) -->
  <circle cx="150" cy="90" r="18" fill="#aed581" opacity="0.6"/>
  <circle cx="250" cy="95" r="16" fill="#aed581" opacity="0.5"/>
  <circle cx="200" cy="50" r="20" fill="#c5e1a5" opacity="0.4"/>

  <!-- Surrounding flora and flowers like in the images -->
  <!-- Left flowers -->
  <circle cx="80" cy="280" r="12" fill="#e91e63"/>
  <circle cx="70" cy="270" r="8" fill="#f06292"/>
  <circle cx="90" cy="270" r="8" fill="#f06292"/>
  <circle cx="75" cy="290" r="8" fill="#f06292"/>
  <circle cx="85" cy="290" r="8" fill="#f06292"/>
  <circle cx="80" cy="275" r="5" fill="#ffd700"/>
  
  <!-- Right flowers -->
  <circle cx="320" cy="290" r="12" fill="#ff9800"/>
  <circle cx="310" cy="280" r="8" fill="#ffb74d"/>
  <circle cx="330" cy="280" r="8" fill="#ffb74d"/>
  <circle cx="305" cy="300" r="8" fill="#ffb74d"/>
  <circle cx="325" cy="300" r="8" fill="#ffb74d"/>
  <circle cx="320" cy="285" r="5" fill="#ffd700"/>

  <!-- Small plants and foliage -->
  <path d="M 60 310 Q 55 295 50 305" stroke="#558b2f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 340 315 Q 345 300 350 310" stroke="#558b2f" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Peacock hint (serpent curves) around tree base -->
  <path d="M 170 270 Q 180 290 170 310" stroke="#8b6f47" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 230 270 Q 220 290 230 310" stroke="#8b6f47" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Brand text with elegant serif -->
  <text x="200" y="380" font-family="Georgia, serif" font-size="28" font-weight="bold" 
        text-anchor="middle" fill="#6d4c41" opacity="0.85" letter-spacing="3">
    DIABOLICAL SCENTS
  </text>
  
  <!-- Subtle tagline -->
  <text x="200" y="398" font-family="Georgia, serif" font-size="11" 
        text-anchor="middle" fill="#8d6e63" opacity="0.6" letter-spacing="2">
    GARDEN OF EDEN
  </text>
</svg>